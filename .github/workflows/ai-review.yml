name: AI Code Review
on: [push]

# Process jobs one at a time to protect VRAM/RAM
concurrency:
  group: local-gpu-processing
  cancel-in-progress: false

jobs:
  review:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run AI Reviewer
        run: |
          # Use the local virtual environment
          source .venv/bin/activate
          python3 review.py

      - name: Post Feedback
        run: |
          SHA=$(git rev-parse HEAD)
          # Post feedback as a comment on the commit
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/commits/$SHA/comments \
            -f body="$(cat ai_feedback.md)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}